# Mouse mode                                                                                                                                                                              
set -g mouse on                                                                                                                                                                           
                                                                                                                                                                                          
# Active pane border colour                                                                                                                                                               
set-option -g pane-active-border-style fg=yellow                                                                                                                                          
                                                                                                                                                                                          
# Reload tmux config                                                                                                                                                                      
bind r source-file ~/.tmux.conf                                                                                                                                                           
                                                                                                                                                                                          
# Use Alt-arrow keys without prefix key to switch panes                                                                                                                                   
bind -n M-Left select-pane -L                                                                                                                                                             
bind -n M-Right select-pane -R                                                                                                                                                            
bind -n M-Up select-pane -U                                                                                                                                                               
bind -n M-Down select-pane -D                                                                                                                                                             
                                                                                                                                                                                          
# Start window and pane numbering at 1                                                                                                                                                    
set -g base-index 1                                                                                                                                                                       
setw -g pane-base-index 1                                                                                                                                                                 
                                                                                                                                                                                          
# Renumber windows when one is closed                                                                                                                                                     
set -g renumber-windows on                                                                                                                                                                
                                                                                                                                                                                          
# Increase scrollback buffer size                                                                                                                                                         
set -g history-limit 50000                                                                                                                                                                
                                                                                                                                                                                          
# Display tmux messages for 4 seconds                                                                                                                                                     
set -g display-time 4000                                                                                                                                                                  
                                                                                                                                                                                          
# Refresh status bar every 5 seconds                                                                                                                                                      
set -g status-interval 5                                                                                                                                                                  
                                                                                                                                                                                          
# Focus events enabled for terminals that support them                                                                                                                                    
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Copy mode vim bindings
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Don't exit copy mode when copying
bind -T copy-mode-vi Enter send-keys -X copy-pipe "pbcopy"

# Fast session switching
bind -r ( switch-client -p
bind -r ) switch-client -n

# Status bar styling
set -g status-position bottom
set -g status-style 'bg=#282828 fg=#ebdbb2'
set -g status-left-length 40
set -g status-left '#[fg=#fabd2f,bold]❐ #S #[fg=#ebdbb2]| '
set -g status-right '#[fg=#98971a]#(whoami)@#H #[fg=#ebdbb2]| #[fg=#83a598]%H:%M %d-%b-%y'
set -g status-right-length 50

# Window status styling
setw -g window-status-format '#[fg=#a89984] #I:#W '
setw -g window-status-current-format '#[fg=#fabd2f,bold] #I:#W '

# Pane border styling
set -g pane-border-style 'fg=#504945'
set -g pane-active-border-style 'fg=#fabd2f'

# Message styling
set -g message-style 'bg=#282828 fg=#fabd2f bold'

# Clock mode
setw -g clock-mode-colour '#83a598'

# Allow local customization in ~/.tmux.conf.local
if-shell "[ -f ~/.tmux.conf.local ]" 'source ~/.tmux.conf.local'
